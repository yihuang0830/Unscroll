<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unscroll</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    header {
      padding: 12px 18px 10px;
      border-bottom: 1px solid #222;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
    header p  { font-size: 11px; color: #888; margin-top: 3px; }

    .site-list { padding: 4px 0; }

    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 18px;
      transition: background 0.15s;
    }
    .site-row:hover { background: #1a1a1a; }

    .site-info { display: flex; align-items: center; }
    .site-name  { font-size: 13px; font-weight: 500; }

    /* Toggle switch */
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #333; border-radius: 22px; cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: ""; position: absolute;
      width: 16px; height: 16px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #4f8ef7; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* Divider */
    .divider { border: none; border-top: 1px solid #222; margin: 4px 0; }

    /* Schedule section */
    .schedule-times {
      padding: 2px 18px 8px 28px;
      display: none;
    }
    .schedule-times.visible { display: block; }

    .time-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }
    .time-label { font-size: 12px; color: #aaa; }

    input[type="time"] {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
    }
    input[type="time"]:focus { border-color: #4f8ef7; }

    .day-picker {
      display: flex;
      gap: 4px;
      padding: 6px 0 2px;
    }
    .day-btn {
      flex: 1;
      height: 26px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 5px;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .day-btn.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    .schedule-hint {
      display: none;
      font-size: 10px;
      color: #555;
      padding: 0 18px 6px 28px;
      line-height: 1.4;
    }
    .schedule-hint.visible { display: block; }

    .timer-section {
      padding: 2px 18px 8px 28px;
      display: none;
    }
    .timer-section.visible { display: block; }
    .timer-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .timer-minutes-input {
      width: 48px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 12px;
      padding: 4px 6px;
      outline: none;
      text-align: center;
      -moz-appearance: textfield;
    }
    .timer-minutes-input::-webkit-inner-spin-button,
    .timer-minutes-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .timer-minutes-input:focus { border-color: #4f8ef7; }
    .timer-unit { font-size: 12px; color: #aaa; flex: 1; }
    .timer-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .timer-btn:hover { opacity: 0.8; }
    .timer-btn-start  { background: #4f8ef7; color: #fff; }
    .timer-btn-cancel { background: #333; color: #aaa; }
    .timer-countdown {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .timer-remaining {
      font-size: 20px;
      font-weight: 600;
      color: #4f8ef7;
      font-variant-numeric: tabular-nums;
    }

    footer {
      padding: 8px 18px;
      border-top: 1px solid #222;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
    footer a {
      color: #555;
      text-decoration: none;
    }
    footer a:hover { color: #aaa; }
  </style>
</head>
<body>
  <header>
    <h1>Unscroll</h1>
    <p>屏蔽推荐 feed，专注搜索</p>
  </header>

  <div class="site-list">
    <div class="site-row">
      <div class="site-info">
        <span class="site-name">Bilibili</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-bilibili" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="site-row">
      <div class="site-info">
        <span class="site-name">小红书</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-xiaohongshu" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="site-row">
      <div class="site-info">
        <span class="site-name">Instagram</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-instagram" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="site-row">
      <div class="site-info">
        <span class="site-name">YouTube</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-youtube" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="site-row">
      <div class="site-info">
        <span class="site-name">Reddit</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-reddit" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <hr class="divider" />

  <!-- Schedule section -->
  <div class="site-row">
    <div class="site-info">
      <span class="site-name">定时开启</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="schedule-enabled" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="schedule-times" id="schedule-times">
    <div class="time-row">
      <span class="time-label">开启时间</span>
      <input type="time" id="schedule-start" value="09:00" />
    </div>
    <div class="time-row">
      <span class="time-label">关闭时间</span>
      <input type="time" id="schedule-end" value="18:00" />
    </div>
    <div class="day-picker" id="day-picker">
      <button class="day-btn" data-day="1">一</button>
      <button class="day-btn" data-day="2">二</button>
      <button class="day-btn" data-day="3">三</button>
      <button class="day-btn" data-day="4">四</button>
      <button class="day-btn" data-day="5">五</button>
      <button class="day-btn" data-day="6">六</button>
      <button class="day-btn" data-day="0">日</button>
    </div>
  </div>
  <p class="schedule-hint" id="schedule-hint"></p>

  <hr class="divider" />

  <!-- Timer section -->
  <div class="site-row">
    <div class="site-info">
      <span class="site-name">放松一下</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="timer-toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="timer-section" id="timer-section">
    <div id="timer-start-view">
      <div class="timer-input-row">
        <input type="number" id="timer-minutes" class="timer-minutes-input" value="10" min="1" max="180" />
        <span class="timer-unit">分钟后关闭</span>
        <button id="timer-start-btn" class="timer-btn timer-btn-start">开始</button>
      </div>
    </div>
    <div id="timer-active-view" style="display:none">
      <div class="timer-countdown">
        <span class="timer-remaining" id="timer-remaining">--:--</span>
        <button id="timer-cancel-btn" class="timer-btn timer-btn-cancel">取消</button>
      </div>
    </div>
  </div>

  <footer><a href="https://github.com/yihuang0830" target="_blank">github: yihuang0830</a></footer>

  <script src="popup.js"></script>
</body>
</html>
